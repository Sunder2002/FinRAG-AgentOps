services:
  redis:
    image: redis:7-alpine
    container_name: finrag_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: finrag_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    # Removed the flaky curl healthcheck here

  api:
    build: .
    container_name: finrag_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: finrag_worker
    command: celery -A celery_worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
      - huggingface_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started # Changed to simply wait for Qdrant to start

networks:
  default:
    name: finrag_network

volumes:
  qdrant_storage:
  huggingface_cache: